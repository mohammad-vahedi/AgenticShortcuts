name: AgenticShortcuts
options:
  bundleIdPrefix: com.agenticshortcuts
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

targets:
  AgenticShortcuts:
    type: application
    platform: macOS
    sources:
      - path: AgenticShortcuts
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agenticshortcuts.app
        PRODUCT_NAME: Agentic Shortcuts
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: AgenticShortcuts/Info.plist
        CODE_SIGN_ENTITLEMENTS: AgenticShortcuts/AgenticShortcuts.entitlements
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    resources:
      - path: AgenticShortcuts/Resources
        buildPhase: resources
